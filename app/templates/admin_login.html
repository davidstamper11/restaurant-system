<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="/static/mexican.css">
</head>

<body class="mexican-theme">
    <h1>Admin Login</h1>
    <form action="/admin/login" method="post">
        <label>Email:<br>
            <input type="email" name="email" required>
        </label><br><br>
        <label>Password:<br>
            <input type="password" name="password" required>
        </label><br><br>
        <button type="submit">Log In</button>
    </form>
</body>

</html>
