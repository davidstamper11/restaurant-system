<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>
        {% if restaurant %}
        Edit Restaurant – {{ restaurant.name }}
        {% else %}
        Add New Restaurant
        {% endif %}
    </title>
    <link rel="stylesheet" href="/static/mexican.css">
    <style>
        body.mexican-theme {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
        }

        form {
            margin-top: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input[type=text],
        input[type=url],
        input[type=number] {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
        }

        .checkbox {
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 8px 16px;
            background: #c24100;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #a53e00;
        }
    </style>
</head>

<body class="mexican-theme">
    <h1>
        {% if restaurant %}
        Edit Restaurant – {{ restaurant.name }}
        {% else %}
        Add New Restaurant
        {% endif %}
    </h1>
    <form action="{{ action }}" method="{{ method }}">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required value="{{ restaurant.name | default('') }}">
        <label for="address">Address *</label>
        <input type="text" id="address" name="address" required value="{{ restaurant.address | default('') }}">
        <label for="google_place_url">Google Place URL</label>
        <input type="url" id="google_place_url" name="google_place_url" value="{{ restaurant.google_place_url or '' }}">
        <label for="google_map_url">Google Map URL</label>
        <input type="url" id="google_map_url" name="google_map_url" value="{{ restaurant.google_map_url or '' }}">
        <label for="website_url">Website URL</label>
        <input type="url" id="website_url" name="website_url" value="{{ restaurant.website_url or '' }}">
        <label for="yelp_url">Yelp URL</label>
        <input type="url" id="yelp_url" name="yelp_url" value="{{ restaurant.yelp_url or '' }}">
        <label for="avg_score">Average Score</label>
        <input type="number" step="0.1" min="0" max="5" id="avg_score" name="avg_score"
            value="{{ restaurant.avg_score | default('') }}">
        <label for="review_count">Review Count</label>
        <input type="number" min="0" id="review_count" name="review_count"
            value="{{ restaurant.review_count | default('') }}">
        <div class="checkbox">
            <label>
                <input type="checkbox" id="visited_yn" name="visited_yn" {% if restaurant.visited_yn %}checked{% endif
                    %}>
                Visited
            </label>
        </div>
        <button type="submit">
            {% if restaurant %}
            Update Restaurant
            {% else %}
            Add Restaurant
            {% endif %}
        </button>
    </form>
    <p><a href="/admin/restaurants">Back to list</a></p>
</body>

</html>
